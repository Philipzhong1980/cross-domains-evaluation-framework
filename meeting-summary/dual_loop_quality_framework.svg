<svg width="1400" height="780" viewBox="0 0 1400 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="blueBox" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E8F1FF"/>
      <stop offset="1" stop-color="#D8E8FF"/>
    </linearGradient>
    <linearGradient id="greenBox" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E8FFF3"/>
      <stop offset="1" stop-color="#D7F7E8"/>
    </linearGradient>
    <linearGradient id="orangeBox" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF3E3"/>
      <stop offset="1" stop-color="#FFE5C2"/>
    </linearGradient>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#3559A6"/>
    </marker>
    <marker id="arrowGreen" markerUnits="userSpaceOnUse" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#178A57"/>
    </marker>
  </defs>

  <rect width="1400" height="780" rx="28" fill="url(#bg)"/>

  <text x="700" y="64" text-anchor="middle" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#102A43">
    Dual-Loop Quality Framework for AI Meeting Summaries
  </text>
  <text x="700" y="98" text-anchor="middle" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#486581">
    Offline regression control and online quality diagnosis share one artifact backbone
  </text>

  <rect x="70" y="148" width="1260" height="262" rx="26" fill="#FFFFFF" stroke="#C9D6E3" stroke-width="2"/>
  <text x="120" y="190" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#1F3A5F">
    Offline Benchmark Loop
  </text>
  <text x="120" y="220" font-size="16" font-family="Arial, Helvetica, sans-serif" fill="#5B7083">
    Goal: prevent regressions before release through transcript-grounded evaluation
  </text>

  <g>
    <rect x="110" y="260" width="220" height="104" rx="18" fill="url(#blueBox)" stroke="#8BB5FF"/>
    <text x="220" y="302" text-anchor="middle" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#1B4D9B">Transcripts</text>
    <text x="220" y="330" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#355070">raw meetings, internal datasets,</text>
    <text x="220" y="350" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#355070">simulated production inputs</text>
  </g>

  <g>
    <rect x="385" y="260" width="220" height="104" rx="18" fill="url(#blueBox)" stroke="#8BB5FF"/>
    <text x="495" y="302" text-anchor="middle" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#1B4D9B">Ground Truth</text>
    <text x="495" y="330" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#355070">topics, points, decisions,</text>
    <text x="495" y="350" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#355070">canonical meeting artifacts</text>
  </g>

  <g>
    <rect x="660" y="260" width="220" height="104" rx="18" fill="url(#blueBox)" stroke="#8BB5FF"/>
    <text x="770" y="302" text-anchor="middle" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#1B4D9B">Candidate Models</text>
    <text x="770" y="330" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#355070">prompted summary generation</text>
    <text x="770" y="350" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#355070">across comparable model variants</text>
  </g>

  <g>
    <rect x="935" y="260" width="220" height="104" rx="18" fill="url(#orangeBox)" stroke="#E2A84A"/>
    <text x="1045" y="302" text-anchor="middle" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#9A5A00">Offline Evaluation</text>
    <text x="1045" y="330" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#7C5A1D">accuracy, completeness, coverage,</text>
    <text x="1045" y="350" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#7C5A1D">judge explanations, error types</text>
  </g>

  <path d="M330 312H385" stroke="#3559A6" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M605 312H660" stroke="#3559A6" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M880 312H935" stroke="#3559A6" stroke-width="4" marker-end="url(#arrow)"/>

  <g>
    <rect x="1185" y="252" width="110" height="118" rx="18" fill="#FFF" stroke="#D7C7A4"/>
    <text x="1240" y="286" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#7A5A10">Reports</text>
    <text x="1240" y="320" text-anchor="middle" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#6B7280">model ranking</text>
    <text x="1240" y="342" text-anchor="middle" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#6B7280">release gating</text>
  </g>
  <path d="M1155 312H1185" stroke="#C98B25" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="70" y="450" width="1260" height="250" rx="26" fill="#FFFFFF" stroke="#C9D6E3" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="120" y="492" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#14532D">
    Online Improvement Loop
  </text>
  <text x="1250" y="492" text-anchor="end" font-size="16" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#56756A">
    Designed; not yet benchmarked
  </text>
  <text x="120" y="522" font-size="16" font-family="Arial, Helvetica, sans-serif" fill="#56756A">
    Goal: diagnose production-facing failures and feed them back into benchmark expansion
  </text>

  <g>
    <rect x="130" y="560" width="250" height="96" rx="18" fill="url(#greenBox)" stroke="#56B88B"/>
    <text x="255" y="600" text-anchor="middle" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#136F46">Application Outputs</text>
    <text x="255" y="627" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#256B50">customer summaries, user feedback,</text>
    <text x="255" y="646" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#256B50">support escalations</text>
  </g>

  <g>
    <rect x="445" y="560" width="250" height="96" rx="18" fill="url(#greenBox)" stroke="#56B88B"/>
    <text x="570" y="600" text-anchor="middle" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#136F46">Online Evaluation</text>
    <text x="570" y="627" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#256B50">diagnose no-GT failures and cluster</text>
    <text x="570" y="646" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#256B50">issues for benchmark expansion</text>
  </g>

  <g>
    <rect x="760" y="560" width="250" height="96" rx="18" fill="url(#greenBox)" stroke="#56B88B"/>
    <text x="885" y="600" text-anchor="middle" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#136F46">Dataset Generator</text>
    <text x="885" y="627" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#256B50">turn hard cases into new GT and</text>
    <text x="885" y="646" text-anchor="middle" font-size="15" font-family="Arial, Helvetica, sans-serif" fill="#256B50">refresh the offline regression suite</text>
  </g>

  <path d="M380 608H445" stroke="#178A57" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M695 608H760" stroke="#178A57" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M1010 608H1216V410" stroke="#178A57" stroke-width="4" fill="none" marker-end="url(#arrowGreen)"/>

</svg>
